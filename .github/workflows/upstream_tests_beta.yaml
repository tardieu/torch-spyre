name: upstream-pytorch-tests-beta

on:
  # Run automatically on every merge to main
  push:
    branches: [main]
    paths-ignore:
      - tests/docs/**
      - docs/**
      - README.md
      - CODEOWNERS
      - .github/workflows/config_integrity_checker.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  checks: write

jobs:
  # Build the torch_spyre._C extension ONCE and publish it as a wheel; the
  # matrix job below installs that single wheel instead of recompiling per entry.
  build:
    name: Build torch-spyre wheel (once)
    # Compile-only: needs the backend image + SDK toolchain but NO physical Spyre
    # card, so it targets the cardless spyre_pf_x0 pool and leaves card runners
    # for the test jobs.
    runs-on:
      - x86_64
      - spyre_pf_x0
      - linux
      - image_spyre_backend
    timeout-minutes: 40
    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: torch-spyre

      - uses: ./.github/actions/gather-runner-info
        with:
          verbose: 'true'

      - name: Build torch-spyre wheel
        uses: ./.github/actions/build-torch-spyre-wheel
        with:
          image_label: image_spyre_backend

      - name: Upload torch-spyre wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: torch-spyre-wheel
          path: torch-spyre/dist/*.whl
          if-no-files-found: error
          retention-days: 5

  upstream-tests:
    name: ${{ matrix.suite.name }}
    needs: build
    runs-on:
      - x86_64
      - spyre_pf_x1
      - linux
      - image_spyre_backend
    timeout-minutes: 60
    env:
      # The CI env var is very important.
      # GitHub actions automatically sets CI=true
      # which causes the pytest inductor tests to fail with AssertionError
      # due to a mix of fallbacks and decompositions.
      # Here we set it to an empty string (or we could also unset it).
      CI: ''

    # ---------------------------------------------------------------------------
    # To add a new upstream test suite, append an entry here:
    #   - name: <human-readable label shown in the GHA UI>
    #     config: <filename inside tests/configs/>
    #
    # The JUnit XML report is automatically named after the config file, e.g.:
    #   test_view_ops_config.yaml  ->  test_view_ops_config.xml
    # ---------------------------------------------------------------------------
    strategy:
      fail-fast: false   # run all suites even if one fails
      matrix:
        suite:
          - name: Indexing
            config: test_indexing.yaml
          - name: Linear algebra
            config: test_linalg.yaml
          - name: NeuralNet pooling
            config: nn-test_pooling.yaml
          - name: NeuralNet embedding
            config: nn-test_embedding.yaml
          - name: NeuralNet init
            config: nn-test_init.yaml
          - name: NeuralNet load state dictionary
            config: nn-test_load_state_dict.yaml
          - name: NeuralNet module hooks
            config: nn-test_module_hooks.yaml
          - name: Profiler execution trace
            config: profiler-test_execution_trace.yaml
          - name: Profiler memory
            config: profiler-test_memory_profiler.yaml
          - name: Profiler torch tidy
            config: profiler-test_torch_tidy.yaml
          - name: Profiler
            config: profiler-test_profiler.yaml
          - name: Reductions
            config: test_reductions.yaml
          - name: Shape ops
            config: test_shape_ops.yaml
          - name: Tensor creation ops
            config: test_tensor_creation_ops.yaml
          - name: Unary ops
            config: test_unary_ufuncs.yaml
          - name: Binary ops
            config: test_binary_ufuncs.yaml
          - name: Spectral ops
            config: test_spectral_ops.yaml
          - name: View ops
            config: test_view_ops.yaml
          - name: Torch
            config: test_torch.yaml
          - name: Sort and select
            config: test_sort_and_select.yaml
          - name: Inductor debug trace
            config: inductor-test_debug_trace.yaml
          - name: Inductor execution lowering stack trace
            config: inductor-test_exc_lowering_stack_trace.yaml
          - name: Inductor fuzzer
            config: inductor-test_fuzzer.yaml
          - name: Inductor mkldnn pattern matcher
            config: inductor-test_mkldnn_pattern_matcher.yaml
          - name: Inductor move constructor to gpu
            config: inductor-test_move_constructors_to_gpu.yaml
          - name: Inductor pattern matcher
            config: inductor-test_pattern_matcher.yaml
          - name: Inductor scatter optimization
            config: inductor-test_scatter_optimization.yaml
          - name: Inductor torch binding
            config: inductor-test_torchbind.yaml
          # All xfail tests. Will result in zero tests collected in "no xfail" mode.
          # There are some mandatory success tests which have been commented out due a potential exclude bug.
          # Once the bug is resolved, this config can be enabled. 
          # - name: Ops
          #   config: test_ops.yaml
          # All xfail tests. Will result in zero tests collected in "no xfail" mode.
          # Retaining the yaml for future use as new spyre capabilities are added.
          # - name: NeuralNet lazy modules
          #   config: nn-test_lazy_modules.yaml 
          # - name: Masked
          #   config: test_masked.yaml
          # - name: Inductor scheduler
          #   config: inductor-test_inductor_scheduler.yaml
          # - name: Inductor op dtype properties
          #   config: inductor-test_op_dtype_prop.yaml
          # - name: NeuralNet convolution
          #   config: nn-test_convolution.yaml

    steps:
      # Sparse checkout into the GHA workspace so the local composite
      # actions under .github/actions/ are available.
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: torch-spyre

      - run: |
          export TORCH_SPYRE_DIR="$GITHUB_WORKSPACE/torch-spyre"
          ls -la "$TORCH_SPYRE_DIR"
          echo "TORCH_SPYRE_DIR $TORCH_SPYRE_DIR"
          echo "TORCH_SPYRE_DIR=${TORCH_SPYRE_DIR}" >> "$GITHUB_ENV"

      - uses: ./.github/actions/checkout-pytorch

      - uses: ./.github/actions/gather-runner-info
        with:
          verbose: 'true'

      - name: Install prebuilt torch-spyre
        uses: ./.github/actions/install-prebuilt-torch-spyre

      - name: Derive report paths
        run: |
          REPORT_NAME="${{ matrix.suite.config }}"; REPORT_NAME="${REPORT_NAME%.yaml}.xml"
          echo "REPORT_NAME=${REPORT_NAME}" >> "$GITHUB_ENV"
          echo "REPORT_PATH=${GITHUB_WORKSPACE}/${REPORT_NAME}" >> "$GITHUB_ENV"

      - name: Run ${{ matrix.suite.name }} tests
        uses: ./.github/actions/run-test-suite
        with:
          suite_name: ${{ matrix.suite.name }}
          config: tests/configs/upstream_tests_beta/${{ matrix.suite.config }}
          extra_test_flags: -v -m "not xfail"
          junit_xml_path: ${{ env.REPORT_PATH }}
          report_name: ${{ env.REPORT_NAME }}

      # ---------------------------------------------------------------------------
      # Upload the JUnit XML as a GHA artifact so it can be downloaded and
      # ingested by the Spyre dashboard.
      #
      # if: always() ensures the report is uploaded even when tests fail —
      # a failed run is exactly when you most want the dashboard to show results.
      #
      # Artifact name matches the report filename so multiple matrix jobs don't
      # overwrite each other (each config produces a distinct name).
      # ---------------------------------------------------------------------------
      - name: Upload JUnit XML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.REPORT_NAME }}
          path: ${{ env.REPORT_PATH }}
          if-no-files-found: warn   # warn (not fail) if pytest itself crashed
          retention-days: 90 # for now keep it for 90 days until we push to COS

<svg viewBox="0 0 380 330" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <rect width="380" height="330" fill="#f8f9fa" rx="8"/>

  <!-- PyTorch code box -->
  <rect x="40" y="15" width="110" height="40" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="95" y="32" text-anchor="middle" font-weight="bold" fill="#333">PyTorch</text>
  <text x="95" y="46" text-anchor="middle" font-weight="bold" fill="#333">code</text>

  <!-- Custom kernels box -->
  <rect x="200" y="15" width="110" height="40" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="255" y="32" text-anchor="middle" font-weight="bold" fill="#333">Custom</text>
  <text x="255" y="46" text-anchor="middle" font-weight="bold" fill="#333">kernels</text>

  <!-- Arrows down from PyTorch code and Custom kernels -->
  <line x1="95" y1="55" x2="95" y2="70" stroke="#333" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="255" y1="55" x2="255" y2="70" stroke="#333" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- PyTorch/dynamo bar -->
  <rect x="20" y="70" width="340" height="30" rx="4" fill="#2563eb" stroke="#1e40af" stroke-width="1"/>
  <text x="190" y="90" text-anchor="middle" font-weight="bold" fill="white">PyTorch / dynamo</text>

  <!-- Arrow down -->
  <line x1="190" y1="100" x2="190" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- Torch Inductor (Frontend) outer box -->
  <rect x="20" y="115" width="340" height="155" rx="6" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="190" y="135" text-anchor="middle" font-weight="bold" font-size="13" fill="white">Torch Inductor (Frontend)</text>

  <!-- InductorIR compiler inner box -->
  <rect x="35" y="142" width="310" height="95" rx="4" fill="#22c55e" stroke="#16a34a" stroke-width="1"/>
  <text x="190" y="158" text-anchor="middle" font-weight="bold" fill="white">InductorIR compiler</text>

  <!-- Spyre Kernel box -->
  <rect x="50" y="165" width="110" height="60" rx="4" fill="#4ade80" stroke="#22c55e" stroke-width="1"/>
  <text x="105" y="192" text-anchor="middle" font-weight="bold" fill="#14532d">Spyre</text>
  <text x="105" y="208" text-anchor="middle" font-weight="bold" fill="#14532d">Kernel</text>

  <!-- Triton Kernel box -->
  <rect x="180" y="165" width="110" height="28" rx="4" fill="#4ade80" stroke="#22c55e" stroke-width="1"/>
  <text x="235" y="184" text-anchor="middle" font-weight="bold" fill="#14532d">Triton Kernel</text>

  <!-- Triton to New IR box -->
  <rect x="180" y="198" width="110" height="28" rx="4" fill="#4ade80" stroke="#22c55e" stroke-width="1"/>
  <text x="235" y="217" text-anchor="middle" font-weight="bold" fill="#14532d">Triton to New IR</text>

  <!-- Arrows down to SDSC and KT IR -->
  <line x1="105" y1="270" x2="105" y2="290" stroke="#333" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="255" y1="270" x2="255" y2="290" stroke="#333" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- SDSC output -->
  <polygon points="65,300 105,288 145,300 105,315" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="105" y="306" text-anchor="middle" font-weight="bold" font-size="11" fill="#333">SDSC</text>

  <!-- KT IR output -->
  <polygon points="215,300 255,288 295,300 255,315" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="255" y="306" text-anchor="middle" font-weight="bold" font-size="11" fill="#333">KT IR</text>

  <defs>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>

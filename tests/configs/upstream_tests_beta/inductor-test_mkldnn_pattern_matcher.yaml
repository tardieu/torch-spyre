test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/inductor/test_mkldnn_pattern_matcher.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise various convolution and transpose operations with dynamic shapes and broadcasting.
        # They are classified as xfail due to unsupported stick expressions and coordinate normalization errors.
        # The relevant Spyre limitations include unsupported stick expressions and complex coordinate normalization.
        - names:
            - TestDynamicPatternMatcherGeneric::test_conv_transpose2d_dynamic_shapes
            - TestPatternMatcherGeneric::test_conv2d_binary_broadcast_shapes
            - TestPatternMatcherGeneric::test_conv2d_linear_add_broadcast_shapes
            - TestPatternMatcherGeneric::test_conv3d_binary_broadcast_shapes
            - TestPatternMatcherGeneric::test_conv_transpose2d_unary
            - TestPatternMatcherGeneric::test_conv_transpose3d_unary
          mode: xfail  # xfail: dxp_standalone not detected
        # These tests exercise 2D and 3D convolution operations with binary and unary tensor behaviors.
        # They are classified as xfail due to unsupported coordinate expressions in the Spyre backend.
        # The relevant Spyre limitation is the inability to handle complex coordinate expressions in tensor operations.
        - names:
            - TestPatternMatcherGeneric::test_conv2d_binary
            - TestPatternMatcherGeneric::test_conv2d_unary
            - TestPatternMatcherGeneric::test_conv3d_binary
            - TestPatternMatcherGeneric::test_conv3d_unary
          mode: xfail  # xfail: torch._inductor.exc.InductorError
        - names:
            - TestDynamicPatternMatcher::test_linear_input_non_contiguous_3D_wo_bias
            - TestDynamicPatternMatcher::test_linear_input_non_contiguous_3D_wo_bias_dynamic_shapes
            - TestDynamicPatternMatcher::test_linear_unary
            - TestDynamicPatternMatcher::test_linear_unary_dynamic_shapes
            - TestDynamicPatternMatcherGeneric::test_multi_linear_share_same_input_dynamic
            - TestPatternMatcher::test_conv2d_add_scalar
            - TestPatternMatcher::test_conv2d_binary
            - TestPatternMatcher::test_conv2d_binary_fusion_failed
            - TestPatternMatcher::test_conv2d_binary_inplace_fusion_failed_cpu
            - TestPatternMatcher::test_conv2d_binary_inplace_fusion_pass_cpu
            - TestPatternMatcher::test_hardtanh_pattern_fallback
            - TestPatternMatcher::test_leaky_relu_pattern_fallback
            - TestPatternMatcher::test_linear_add_bias
            - TestPatternMatcher::test_linear_binary
            - TestPatternMatcher::test_linear_binary_broadcast_shapes
            - TestPatternMatcher::test_linear_fp32
            - TestPatternMatcher::test_linear_input_non_contiguous_3D_wo_bias
            - TestPatternMatcher::test_linear_unary
            - TestPatternMatcher::test_multi_linear_share_same_input
            - TestPatternMatcher::test_reproduce_113440_issue_1
            - TestPatternMatcher::test_reproduce_113440_issue_2
            - TestPatternMatcher::test_reproduce_121253_issue_addmm_fusion_check
            - TestPatternMatcher::test_reproduce_99842_issue
            - TestPatternMatcher::test_woq_int4_cpu
          mode: skip  # does not engage the torch-spyre layer

  global:

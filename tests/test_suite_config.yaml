test_suite_config:
  files:
    - path: ${PYTORCH}/test/test_modules.py
      unlisted_test_mode: skip
      tests:
        - names:
            - TestModule::test_forward
          mode: mandatory_success
          edits:
            modules:
              include:
                - name: torch.nn.BatchNorm2d
                  description: add batchnorm even though not in global.supported_modules
              exclude:
                - name: torch.nn.Linear
                  description: Linear causes OOM on this test

  global:
    supported_dtypes:
      - name: float16
      - name: int64
    supported_ops:
      - name: add
        dtypes:
          - name: float16
            precision:
              atol: 1e-3
              rtol: 1e-3
          - name: int64
      - name: mul
      - name: sub
      - name: gcd
        force_xfail: true
    supported_modules:
      - name: torch.nn.Linear
      - name: torch.nn.Conv2d
      - name: torch.nn.ReLU
        force_xfail: true
